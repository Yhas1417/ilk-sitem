<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesabım - Profil Ayarları</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .avatar { width: 80px; height: 80px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin: 0 auto 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin: 10px 0; font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-back { background: #eee; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar" id="user-avatar">?</div>
    <h2 id="user-title">Yükleniyor...</h2>
    
    <div style="text-align:left;">
        <label style="font-size:13px; font-weight:bold; color:#666;">Yeni Kullanıcı Adı</label>
        <input type="text" id="edit-username">
    </div>

    <button class="btn-blue" onclick="updateProfile()">Değişiklikleri Kaydet</button>
    <button class="btn-back" onclick="window.location.href='panel.html'">⬅️ Geri Dön</button>
</div>

<script>
    // --- FIREBASE CONFIG (Kendi bilgilerinle doldur) ---
    const firebaseConfig = {
        apiKey: "AIzaSyArIYOp-msUGe_T4bLiVkoDhvXYhLuWVeo",
        authDomain: "test-sitem.firebaseapp.com",
        databaseURL: "https://test-sitem-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "test-sitem",
        storageBucket: "test-sitem.firebasestorage.app",
        messagingSenderId: "97147105273",
        appId: "1:97147105273:web:6e70cf559735f68fb8d728",
        measurementId: "G-ETZLC279HD"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth(); // Kütüphane eklendiği için artık hata vermez

    // Oturum Kontrolü
    auth.onAuthStateChanged((user) => {
        if (user) {
            db.ref('profiles/' + user.uid).once('value', (snapshot) => {
                let name = snapshot.exists() ? snapshot.val().username : "Kullanıcı";
                
                // Ekranı güncelle
                document.getElementById('edit-username').value = name;
                document.getElementById('user-avatar').innerText = name.charAt(0).toUpperCase();
                document.getElementById('user-title').innerText = name;
                
                // LocalStorage'ı da tazeleyelim
                localStorage.setItem('user_name', name);
                localStorage.setItem('user_uid', user.uid);
            });
        } else {
            // Giriş yoksa index'e at
            window.location.href = "index.html";
        }
    });

    function updateProfile() {
        const newName = document.getElementById('edit-username').value.trim();
        const user = auth.currentUser;

        if (newName && user) {
            db.ref('profiles/' + user.uid).update({ username: newName }).then(() => {
                localStorage.setItem('user_name', newName);
                alert("Başarıyla güncellendi!");
                location.reload();
            }).catch(e => alert("Hata: " + e.message));
        }
    }
</script>
</body>
</html>
