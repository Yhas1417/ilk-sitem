<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-blue { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #1877f2; color: white; font-weight: bold; cursor: pointer; }
        .link { display: block; margin-top: 15px; color: #1877f2; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Giriş Yap</h2>
        <input type="text" id="user-name" placeholder="Kullanıcı Adı">
        <input type="password" id="user-pass" placeholder="Şifre">
        <button class="btn-blue" onclick="login()">Giriş Yap</button>
        <a href="kayit.html" class="link">Hesabın yok mu? Kayıt Ol</a>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyArIYOp-msUGe_T4bLiVkoDhvXYhLuWVeo",
          authDomain: "test-sitem.firebaseapp.com",
          databaseURL: "https://test-sitem-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "test-sitem",
          storageBucket: "test-sitem.firebasestorage.app",
          messagingSenderId: "97147105273",
          appId: "1:97147105273:web:6e70cf559735f68fb8d728",
          measurementId: "G-ETZLC279HD"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Otomatik Giriş Kontrolü
        window.onload = () => {
            if(localStorage.getItem('user_name')) window.location.href = "panel.html";
        };

        function login() {
            const n = document.getElementById('user-name').value.trim();
            const p = document.getElementById('user-pass').value.trim();
            if(!n || !p) return alert("Boş bırakma!");

            db.ref('users/' + n).once('value', s => {
                if(s.exists() && s.val().password === p) {
                    localStorage.setItem('user_name', n);
                    localStorage.setItem('user_pass', p);
                    window.location.href = "panel.html";
                } else alert("Hatalı bilgiler!");
            });
        }
    </script>
</body>
</html>
