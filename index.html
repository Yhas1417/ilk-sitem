<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medya Paylaşım Portalı</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .file-label { display: block; background: #eef5ff; color: var(--primary); padding: 15px; border: 2px dashed var(--primary); border-radius: 12px; cursor: pointer; margin: 10px 0; font-weight: bold; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-blue { background: var(--primary); color: white; }
        .hidden { display: none; }
        
        .card { background: white; border-radius: 12px; padding: 15px; margin: 15px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: left; }
        .media-preview { width: 100%; border-radius: 8px; margin-top: 10px; max-height: 300px; object-fit: cover; }
        #progress-bar { width: 0%; height: 5px; background: #42b72a; transition: 0.3s; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-page">
        <h2>Giriş Yap</h2>
        <input type="text" id="user-name" placeholder="Kullanıcı Adı">
        <input type="password" id="user-pass" placeholder="Şifre">
        <button class="btn-blue" onclick="login()">Giriş / Kayıt</button>
    </div>

    <div id="main-page" class="hidden">
        <h3>Merhaba, <span id="display-name" style="color:var(--primary)"></span></h3>
        
        <div id="upload-area">
            <textarea id="msg-text" placeholder="Mesajınız..."></textarea>
            
            <label class="file-label">
                📷 Fotoğraf veya 🎥 Video Seç
                <input type="file" id="file-input" style="display:none" accept="image/*,video/*">
            </label>
            <div id="progress-container" style="background:#eee; border-radius:5px; margin:5px 0;">
                <div id="progress-bar"></div>
            </div>
            
            <button id="send-btn" class="btn-blue" onclick="uploadData()">Gönder</button>
        </div>

        <div id="admin-view" class="hidden">
            <hr>
            <h4>📩 Gelen Medyalar</h4>
            <div id="media-list"></div>
        </div>

        <button onclick="location.reload()" style="background:#ddd; margin-top:20px;">Çıkış Yap</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (Kendi bilgilerini buraya koy!) ---
    const firebaseConfig = {
        apiKey: "AIzaSyArIYOp-msUGe_T4bLiVkoDhvXYhLuWVeo",
        authDomain: "test-sitem.firebaseapp.com",
        databaseURL: "https://test-sitem-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "test-sitem",
        storageBucket: "test-sitem.firebasestorage.app",
        messagingSenderId: "97147105273",
        appId: "1:97147105273:web:6e70cf559735f68fb8d728",
        measurementId: "G-ETZLC279HD"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    function login() {
        const n = document.getElementById('Yusuf Hüsrev').value;
        const p = document.getElementById('1417admin1417').value;
        if(!n || !p) return;

        db.ref('users/' + n).once('value', s => {
            if(s.exists() && s.val().password === p) start(n);
            else if(!s.exists()) db.ref('users/' + n).set({password: p}).then(()=>start(n));
            else alert("Hata!");
        });
    }

    function start(n) {
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('main-page').classList.remove('hidden');
        document.getElementById('display-name').innerText = n;
        if(n === "admin") {
            document.getElementById('admin-view').classList.remove('hidden');
            loadMedia();
        }
    }

    async function uploadData() {
        const file = document.getElementById('file-input').files[0];
        const text = document.getElementById('msg-text').value;
        const name = document.getElementById('display-name').innerText;
        const btn = document.getElementById('send-btn');

        if(!file && !text) return alert("Dosya veya mesaj seçin!");
        
        btn.disabled = true;
        btn.innerText = "Yükleniyor...";

        let fileUrl = "";

        if(file) {
            const storageRef = storage.ref('medya/' + Date.now() + "_" + file.name);
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', 
                (snap) => {
                    const prog = (snap.bytesTransferred / snap.totalBytes) * 100;
                    document.getElementById('progress-bar').style.width = prog + "%";
                }, 
                (err) => alert("Yükleme hatası!"), 
                async () => {
                    fileUrl = await uploadTask.snapshot.ref.getDownloadURL();
                    saveToDb(name, text, fileUrl, file.type);
                }
            );
        } else {
            saveToDb(name, text, "", "");
        }
    }

    function saveToDb(name, text, url, type) {
        db.ref('paylasimlar').push({
            kimden: name,
            mesaj: text,
            medyaUrl: url,
            medyaTipi: type,
            tarih: new Date().toLocaleString()
        }).then(() => {
            alert("Başarıyla gönderildi!");
            location.reload();
        });
    }

    function loadMedia() {
        db.ref('paylasimlar').on('value', s => {
            const list = document.getElementById('media-list');
            list.innerHTML = "";
            s.forEach(c => {
                const d = c.val();
                let mediaHtml = "";
                if(d.medyaUrl) {
                    if(d.medyaTipi.includes('image')) mediaHtml = `<img src="${d.medyaUrl}" class="media-preview">`;
                    else if(d.medyaTipi.includes('video')) mediaHtml = `<video src="${d.medyaUrl}" controls class="media-preview"></video>`;
                }
                list.innerHTML = `
                    <div class="card">
                        <b>👤 ${d.kimden}</b> <small>${d.tarih}</small><br>
                        <p>${d.mesaj}</p>
                        ${mediaHtml}
                    </div>
                ` + list.innerHTML;
            });
        });
    }
</script>
</body>
</html>
