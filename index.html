<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Sosyal Akış</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-blue { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #1877f2; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        /* GOOGLE BUTONU */
        .btn-google { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: white; color: #5f6368; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; transition: 0.2s; }
        .btn-google:hover { background: #f8f9fa; }

        .links { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .link { color: #1877f2; text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Giriş Yap</h2>
        <input type="email" id="user-email" placeholder="E-posta Adresiniz">
        <input type="password" id="user-pass" placeholder="Şifreniz">
        <button class="btn-blue" onclick="login()">Giriş Yap</button>
        
        <button class="btn-google" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Google ile Devam Et
        </button>
        
        <div class="links">
            <a href="kayit.html" class="link">Yeni Hesap Oluştur</a>
        </div>
    </div>

    <script>
        // --- FIREBASE AYARLARINI BURAYA YAPIŞTIR ---
        const firebaseConfig = {
            apiKey: "AIzaSyArIYOp-msUGe_T4bLiVkoDhvXYhLuWVeo",
            authDomain: "test-sitem.firebaseapp.com",
            databaseURL: "https://test-sitem-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "test-sitem",
            storageBucket: "test-sitem.firebasestorage.app",
            messagingSenderId: "97147105273",
            appId: "1:97147105273:web:6e70cf559735f68fb8d728",
            measurementId: "G-ETZLC279HD"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function login() {
            const email = document.getElementById('user-email').value.trim();
            const pass = document.getElementById('user-pass').value.trim();
            auth.signInWithEmailAndPassword(email, pass).then((res) => {
                if(res.user.emailVerified) {
                    db.ref('profiles/' + res.user.uid).once('value', s => {
                        localStorage.setItem('user_name', s.exists() ? s.val().username : "Kullanıcı");
                        localStorage.setItem('user_pass', pass);
                        window.location.href = "panel.html";
                    });
                } else { alert("Lütfen mailinizi onaylayın!"); auth.signOut(); }
            }).catch(e => alert(e.message));
        }

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then((res) => {
                const nick = res.user.displayName || res.user.email.split('@')[0];
                localStorage.setItem('user_name', nick);
                db.ref('profiles/' + res.user.uid).update({ username: nick });
                window.location.href = "panel.html";
            }).catch(e => alert(e.message));
        }
    </script>
</body>
</html>
