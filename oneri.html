<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öneri Gönder - Sosyal Akış</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #65676b; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; font-family: inherit; }
        .btn-send { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-send:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💡 Bir Önerim Var!</h2>
    <p style="color: #65676b; font-size: 14px; margin-bottom: 25px;">Fikirlerin bizim için değerli. (Günlük limit: 3)</p>

    <form id="oneri-form">
        <div class="input-group">
            <label>Öneri Başlığı</label>
            <input type="text" id="oneri-baslik" required placeholder="Örn: Uygulama tasarımı hakkında">
        </div>

        <div class="input-group">
            <label>Fotoğraf Seç (Opsiyonel)</label>
            <input type="file" id="oneri-dosya" accept="image/*">
        </div>

        <div class="input-group">
            <label>Detaylı Açıklama</label>
            <textarea id="oneri-metin" required placeholder="Fikrinizi buraya yazın..."></textarea>
        </div>

        <button type="submit" class="btn-send" id="btn-text">Öneriyi Admin'e Gönder</button>
    </form>

    <div id="status"></div>
    <a href="panel.html" style="display:block; margin-top:20px; color:#65676b; text-decoration:none; font-size:14px;">⬅️ Panele Geri Dön</a>
</div>

<script type="text/javascript">
    // SAYFA TAMAMEN YÜKLENDİĞİNDE ÇALIŞSIN
    window.onload = function() {
        
        // --- CONFIG --- (Buraları doldurmayı unutma)
        const firebaseConfig = {
            apiKey: "AIzaSyArIYOp-msUGe_T4bLiVkoDhvXYhLuWVeo",
            authDomain: "test-sitem.firebaseapp.com",
            databaseURL: "https://test-sitem-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "test-sitem",
            storageBucket: "test-sitem.firebasestorage.app",
            messagingSenderId: "97147105273",
            appId: "1:97147105273:web:6e70cf559735f68fb8d728",
            measurementId: "G-ETZLC279HD"
        };

        // Başlatma İşlemleri
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();
        emailjs.init("F0PHPWDt14oaE0qiH");

        // Elementleri burada yakalıyoruz
        const form = document.getElementById('oneri-form');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('btn-text');

        // Form gönderildiğinde
        if (form) {
            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                
                const myName = localStorage.getItem('user_name') || "Bilinmeyen Kullanıcı";
                
                // Güvenlik kontrolü
                if (!statusDiv || !btn) {
                    console.error("Hata: HTML elementleri bulunamadı!");
                    return;
                }

                btn.innerText = "Kontrol ediliyor...";
                btn.disabled = true;

                try {
                    // 1. Limit Kontrolü
                    const bugun = new Date().toLocaleDateString('tr-TR');
                    const snapshot = await db.ref('oneriler_log').orderByChild('kimden').equalTo(myName).once('value');
                    
                    let bugunkuOneriSayisi = 0;
                    snapshot.forEach(child => {
                        if(child.val().tarih === bugun) bugunkuOneriSayisi++;
                    });

                    if (bugunkuOneriSayisi >= 3) {
                        statusDiv.style.color = "#ff4757";
                        statusDiv.innerText = "⚠️ Günlük 3 öneri limitine ulaştınız!";
                        btn.innerText = "Limit Doldu";
                        btn.disabled = true;
                        return;
                    }

                    // 2. Fotoğraf Yükleme
                    const file = document.getElementById('oneri-dosya').files[0];
                    let photoUrl = "Fotoğraf eklenmedi";

                    if (file) {
                        btn.innerText = "Fotoğraf Yükleniyor...";
                        const fileRef = storage.ref('oneriler/' + Date.now() + "_" + file.name);
                        await fileRef.put(file);
                        photoUrl = await fileRef.getDownloadURL();
                    }

                    // 3. EmailJS
                    btn.innerText = "Mail Gönderiliyor...";
                    const templateParams = {
                        user_name: myName,
                        user_email: auth.currentUser ? auth.currentUser.email : "E-posta yok",
                        subject: document.getElementById('oneri-baslik').value,
                        photo_url: photoUrl,
                        message: document.getElementById('oneri-metin').value
                    };

                    await emailjs.send('service_iqra', 'template_473n5dj', templateParams);

                    // 4. Başarılı İşlem
                    await db.ref('oneriler_log').push({ kimden: myName, tarih: bugun });

                    statusDiv.style.color = "#42b72a";
                    statusDiv.innerText = "✅ Öneriniz admin mailine iletildi!";
                    form.reset();

                } catch (error) {
                    console.error("Hata Detayı:", error);
                    statusDiv.style.color = "#ff4757";
                    statusDiv.innerText = "❌ Bir hata oluştu.";
                } finally {
                    btn.innerText = "Öneriyi Admin'e Gönder";
                    btn.disabled = false;
                }
            });
        }
    };
</script>
</body>
</html>
