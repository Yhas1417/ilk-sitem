<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öneri Gönder - Sosyal Akış</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #65676b; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn-send { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-send:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>💡 Öneri Gönder</h2>
    <form id="oneri-form">
        <div class="input-group">
            <label>Başlık</label>
            <input type="text" id="subject" required>
        </div>
        <div class="input-group">
            <label>Fotoğraf Seç</label>
            <input type="file" id="photo" accept="image/*">
        </div>
        <div class="input-group">
            <label>Mesajınız</label>
            <textarea id="message" rows="4" required></textarea>
        </div>
        <button type="submit" id="btn" class="btn-send">Admin'e Gönder</button>
    </form>
    <div id="status" style="margin-top:15px;"></div>
    <a href="panel.html" style="display:block; margin-top:15px; color:#666; text-decoration:none;">⬅️ Geri Dön</a>
</div>

<script type="text/javascript">
   // 1. EmailJS Başlatma
   (function(){
      emailjs.init("F0PHPWDt14oaE0qiH");
   })();

   // 2. Firebase Başlatma
   const firebaseConfig = {
       apiKey: "AIzaSyArIYOp-msUGe_T4bLiVkoDhvXYhLuWVeo",
       authDomain: "test-sitem.firebaseapp.com",
       databaseURL: "https://test-sitem-default-rtdb.europe-west1.firebasedatabase.app",
       projectId: "test-sitem",
       storageBucket: "test-sitem.firebasestorage.app",
       messagingSenderId: "97147105273",
       appId: "1:97147105273:web:6e70cf559735f68fb8d728",
       measurementId: "G-ETZLC279HD"
   };
   firebase.initializeApp(firebaseConfig);
   const auth = firebase.auth();
   const db = firebase.database();
   const storage = firebase.storage();

   const form = document.getElementById('oneri-form');
   const statusDiv = document.getElementById('status');
   const btn = document.getElementById('btn-text');

   form.addEventListener('submit', async function(event) {
        event.preventDefault();
        const myName = localStorage.getItem('user_name') || "Bilinmeyen Kullanıcı";
        
        btn.innerText = "Kontrol ediliyor...";
        btn.disabled = true;

        // --- GÜNLÜK 3 ÖNERİ SINIRI KONTROLÜ ---
        const bugun = new Date().toLocaleDateString('tr-TR');
        const snapshot = await db.ref('oneriler_log').orderByChild('kimden').equalTo(myName).once('value');
        
        let bugunkuOneriSayisi = 0;
        snapshot.forEach(child => {
            if(child.val().tarih === bugun) bugunkuOneriSayisi++;
        });

        if (bugunkuOneriSayisi >= 3) {
            statusDiv.style.color = "#ff4757";
            statusDiv.innerText = "⚠️ Günlük 3 öneri limitine ulaştınız. Yarın tekrar deneyebilirsiniz!";
            btn.innerText = "Limit Doldu";
            return;
        }

        // --- FOTOĞRAF YÜKLEME (FIREBASE STORAGE) ---
        btn.innerText = "Fotoğraf Yükleniyor...";
        const file = document.getElementById('oneri-dosya').files[0];
        let photoUrl = "Fotoğraf eklenmedi";

        if (file) {
            try {
                const fileRef = storage.ref('oneriler/' + Date.now() + "_" + file.name);
                await fileRef.put(file);
                photoUrl = await fileRef.getDownloadURL();
            } catch (err) {
                console.error("Yükleme hatası:", err);
            }
        }

        // --- EMAILJS GÖNDERİMİ ---
        btn.innerText = "Mail Gönderiliyor...";
        const templateParams = {
            user_name: myName,
            user_email: auth.currentUser ? auth.currentUser.email : "E-posta yok",
            subject: document.getElementById('oneri-baslik').value,
            photo_url: photoUrl, // Artık kalıcı bir Firebase linki gidiyor
            message: document.getElementById('oneri-metin').value
        };

        emailjs.send('service_iqra', 'template_473n5dj', templateParams)
            .then(async function() {
                // Gönderim başarılıysa log tut (limit için)
                await db.ref('oneriler_log').push({
                    kimden: myName,
                    tarih: bugun
                });

                statusDiv.style.color = "#42b72a";
                statusDiv.innerText = "✅ Öneriniz başarıyla admin mailine iletildi!";
                form.reset();
            }, function(error) {
                statusDiv.style.color = "#ff4757";
                statusDiv.innerText = "❌ Hata oluştu!";
            })
            .finally(() => {
                btn.innerText = "Öneriyi Admin'e Gönder";
                btn.disabled = false;
            });
   });
</script>
</body>
</html>
