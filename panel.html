<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobi Sosyal Akış - Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; --admin-bg: #fff9c4; --success: #42b72a; --pinned: #fff4e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        /* MENÜ VE SIDEBAR */
        .menu-btn { position: fixed; top: 15px; left: 15px; font-size: 24px; cursor: pointer; z-index: 1000; background: white; padding: 5px 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; transition: 0.3s; z-index: 1001; box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .side-menu.open { left: 0; }
        .menu-close { text-align: right; font-size: 24px; cursor: pointer; color: #666; }
        
        .container { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; margin-top: 60px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 10px 0; box-sizing: border-box; font-size: 16px; outline: none; resize: vertical; }
        .file-label { display: block; background: #f0f7ff; padding: 15px; border: 2px dashed var(--primary); border-radius: 12px; cursor: pointer; font-weight: bold; color: var(--primary); margin: 10px 0; }
        
        /* KART TASARIMI */
        .card { background: white; border-radius: 12px; padding: 15px; margin: 15px 0; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: left; position: relative; }
        .card.pinned { background: var(--pinned); border-left-color: #ff9800; }
        .pin-icon { position: absolute; top: 10px; right: 10px; font-size: 18px; color: #ff9800; }
        
        .media-preview { width: 100%; border-radius: 8px; margin-top: 10px; max-height: 400px; object-fit: contain; }
        
        /* YORUM BÖLÜMÜ */
        .comment-section { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .comment { background: #f8f9fa; padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 14px; }
        .comment b { color: var(--primary); }
        .comment-input-area { display: flex; gap: 5px; margin-top: 10px; }
        .comment-input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; }
        .btn-send-comment { background: var(--primary); color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; }
        
        .admin-badge { background: #333; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; vertical-align: middle; }
        .btn-pin { background: none; border: 1px solid #ff9800; color: #ff9800; padding: 2px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div id="side-menu" class="side-menu">
        <div class="menu-close" onclick="toggleMenu()">✕</div>
        <div class="menu-content">
            <div class="user-info" style="text-align:center;">
                <div id="avatar-char" style="width:60px; height:60px; background:var(--primary); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 10px;">?</div>
                <h4 id="menu-user-name">Kullanıcı</h4>
            </div>
            <hr>
            <div class="menu-item" onclick="window.location.href='hesabim.html'">👤 Hesap Ayarları</div>
            <div class="menu-item" onclick="logout()" style="color:#ff4757;">🚪 Oturumu Kapat</div>
        </div>
    </div>

    <div class="container">
        <h3>Merhaba, <span id="display-name" style="color:var(--primary)"></span></h3>
        <div id="upload-area">
            <textarea id="msg-text" placeholder="Toplulukla paylaş..." maxlength="1000"></textarea>
            <label class="file-label">📸 Foto/Video Seç <input type="file" id="file-input" style="display:none" accept="image/*,video/*"></label>
            <button onclick="checkAndUpload()" id="up-btn" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Paylaş</button>
        </div>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <div id="media-list"></div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyArIYOp-msUGe_T4bLiVkoDhvXYhLuWVeo",
            authDomain: "test-sitem.firebaseapp.com",
            databaseURL: "https://test-sitem-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "test-sitem",
            storageBucket: "test-sitem.firebasestorage.app",
            messagingSenderId: "97147105273",
            appId: "1:97147105273:web:6e70cf559735f68fb8d728",
            measurementId: "G-ETZLC279HD"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        const auth = firebase.auth();

        // ADMİN AYARI
        const ADMIN_MAIL = "yusufkeskin1417@gmail.com"; 

        let currentAdminState = false;
        let myName = localStorage.getItem('user_name') || "Misafir";

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentAdminState = (user.email === ADMIN_MAIL);
                document.getElementById('display-name').innerText = myName;
                document.getElementById('menu-user-name').innerText = myName;
                document.getElementById('avatar-char').innerText = myName.charAt(0).toUpperCase();
                verileriYukle(currentAdminState);
            } else {
                window.location.href = "index.html";
            }
        });

        function verileriYukle(isAdmin) {
            db.ref('akıs').on('value', s => {
                const list = document.getElementById('media-list');
                list.innerHTML = "";
                let posts = [];

                s.forEach(c => {
                    let post = c.val();
                    post.key = c.key;
                    posts.push(post);
                });

                // SIRALAMA: Sabitlenenler en üste, sonra tarih
                posts.sort((a, b) => (b.pinned || 0) - (a.pinned || 0));

                posts.forEach(d => {
                    let mediaHtml = d.url ? (d.tip.includes('image') ? `<img src="${d.url}" class="media-preview">` : `<video src="${d.url}" controls class="media-preview"></video>`) : "";
                    let pinBtn = isAdmin ? `<button class="btn-pin" onclick="togglePin('${d.key}', ${d.pinned})">${d.pinned ? '📌 Sabit Kaldır' : '📌 Sabitle'}</button>` : "";
                    let pinMark = d.pinned ? `<span class="pin-icon">📌</span>` : "";

                    // Yorumları Listele
                    let commentsHtml = "";
                    if (d.comments) {
                        Object.values(d.comments).forEach(c => {
                            commentsHtml += `<div class="comment"><b>${c.user}:</b> ${c.text}</div>`;
                        });
                    }

                    list.innerHTML += `
                        <div class="card ${d.pinned ? 'pinned' : ''}">
                            ${pinMark}
                            <b>👤 ${d.kimden}</b> ${pinBtn}
                            <p>${d.mesaj}</p>
                            ${mediaHtml}
                            <div class="comment-section">
                                <div id="comments-${d.key}">${commentsHtml}</div>
                                <div class="comment-input-area">
                                    <input type="text" id="input-${d.key}" class="comment-input" placeholder="Yorum yaz...">
                                    <button class="btn-send-comment" onclick="addComment('${d.key}')">Gönder</button>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function addComment(postKey) {
            const text = document.getElementById('input-' + postKey).value.trim();
            if(!text) return;
            db.ref('akıs/' + postKey + '/comments').push({
                user: myName,
                text: text,
                date: Date.now()
            }).then(() => {
                document.getElementById('input-' + postKey).value = "";
            });
        }

        function togglePin(postKey, currentState) {
            db.ref('akıs/' + postKey).update({
                pinned: currentState ? 0 : 1
            });
        }

        async function checkAndUpload() {
            const file = document.getElementById('file-input').files[0];
            const text = document.getElementById('msg-text').value.trim();
            if(!file && !text) return alert("Boş bırakma!");

            const btn = document.getElementById('up-btn');
            btn.disabled = true; btn.innerText = "Yükleniyor...";

            if(file) {
                const ref = storage.ref('akıs/' + Date.now());
                const task = ref.put(file);
                task.on('state_changed', null, null, async () => {
                    const url = await task.snapshot.ref.getDownloadURL();
                    db.ref('akıs').push({ kimden: myName, mesaj: text, url: url, tip: file.type, pinned: 0, date: Date.now() });
                    location.reload();
                });
            } else {
                db.ref('akıs').push({ kimden: myName, mesaj: text, url: "", tip: "", pinned: 0, date: Date.now() });
                location.reload();
            }
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        function logout() { auth.signOut().then(() => { localStorage.clear(); window.location.href = "index.html"; }); }
    </script>
</body>
</html>
