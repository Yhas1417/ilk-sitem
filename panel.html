<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobi Sosyal Akış - Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; --admin-bg: #fff9c4; --success: #42b72a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        /* MENÜ VE SIDEBAR */
        .menu-btn { position: fixed; top: 15px; left: 15px; font-size: 24px; cursor: pointer; z-index: 1000; background: white; padding: 5px 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; transition: 0.3s; z-index: 1001; box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .side-menu.open { left: 0; }
        .menu-close { text-align: right; font-size: 24px; cursor: pointer; color: #666; }
        .user-info { text-align: center; margin-top: 10px; }
        .user-avatar { width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 0 auto 10px; }
        .menu-item { padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: 500; text-align: left; margin-bottom: 5px; }
        .menu-item:hover { background: #f0f2f5; }

        .container { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; margin-top: 60px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 10px 0; box-sizing: border-box; font-size: 16px; outline: none; resize: vertical; }
        .file-label { display: block; background: #f0f7ff; padding: 15px; border: 2px dashed var(--primary); border-radius: 12px; cursor: pointer; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .card { background: white; border-radius: 12px; padding: 15px; margin: 15px 0; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: left; }
        .media-preview { width: 100%; border-radius: 8px; margin-top: 10px; max-height: 400px; object-fit: contain; }
        #progress-bar { width: 0%; height: 5px; background: var(--success); transition: 0.3s; }
        #status-msg { margin-top: 10px; font-weight: bold; color: var(--success); display: none; }
        button#up-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .reply-box { background: var(--admin-bg); border: 1px solid #fbc02d; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div id="side-menu" class="side-menu">
        <div class="menu-close" onclick="toggleMenu()">✕</div>
        <div class="menu-content">
            <div class="user-info">
                <div class="user-avatar" id="avatar-char">?</div>
                <h4 id="menu-user-name">Kullanıcı</h4>
            </div>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <div class="menu-item" onclick="window.location.href='hesabim.html'">👤 Hesap Ayarları</div>
            <div class="menu-item" onclick="logout()" style="color:#ff4757; margin-top:20px;">🚪 Oturumu Kapat</div>
        </div>
    </div>

    <div class="container">
        <h3>Merhaba, <span id="display-name" style="color:var(--primary)"></span></h3>
        
        <div id="upload-area">
            <textarea id="msg-text" placeholder="Toplulukla paylaş... (Maks. 1000)" maxlength="1000"></textarea>
            <label class="file-label">📸 Fotoğraf / 🎥 Video Seç <input type="file" id="file-input" style="display:none" accept="image/*,video/*"></label>
            <div style="background:#eee; height:5px; border-radius:5px; overflow:hidden; margin-bottom:10px;"><div id="progress-bar"></div></div>
            <div id="status-msg"></div>
            <button onclick="checkAndUpload()" id="up-btn">Paylaş</button>
        </div>

        <hr style="margin:25px 0; border:0; border-top:1px solid #eee;">
        <h4 style="text-align:left;">🌍 Genel Akış</h4>
        <div id="media-list"></div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyArIYOp-msUGe_T4bLiVkoDhvXYhLuWVeo",
            authDomain: "test-sitem.firebaseapp.com",
            databaseURL: "https://test-sitem-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "test-sitem",
            storageBucket: "test-sitem.firebasestorage.app",
            messagingSenderId: "97147105273",
            appId: "1:97147105273:web:6e70cf559735f68fb8d728",
            measurementId: "G-ETZLC279HD"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // --- 2. ADMİN BİLGİLERİ (BURAYI DOLDURUN) ---
        const GERCEK_ADMIN_ADI = "Yusuf Keskin"; 
        const GERCEK_ADMIN_SIFRE = "1417admin1417"; 

        const currentUser = localStorage.getItem('user_name');
        const currentPass = localStorage.getItem('user_pass');

        if(!currentUser) { 
            window.location.href = "index.html"; 
        } else { 
            document.getElementById('display-name').innerText = currentUser;
            document.getElementById('menu-user-name').innerText = currentUser;
            document.getElementById('avatar-char').innerText = currentUser.charAt(0).toUpperCase();
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }

        async function checkAndUpload() {
            const file = document.getElementById('file-input').files[0];
            const text = document.getElementById('msg-text').value.trim();
            const btn = document.getElementById('up-btn');
            if(!file && !text) return alert("Boş gönderemezsin!");

            // GÜNLÜK 3 MESAJ SINIRI
            if (currentUser !== GERCEK_ADMIN_ADI) {
                const bugun = new Date().toLocaleDateString('tr-TR');
                const snapshot = await db.ref('akıs').orderByChild('kimden').equalTo(currentUser).once('value');
                let sayac = 0;
                snapshot.forEach(c => { if(c.val().tarih && c.val().tarih.includes(bugun)) sayac++; });
                if(sayac >= 3) return alert("Günlük 3 paylaşım limitine ulaştınız!");
            }

            if (file && file.type.includes('video')) {
                btn.disabled = true; btn.innerText = "Süre kontrolü...";
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = function() {
                    window.URL.revokeObjectURL(video.src);
                    if (video.duration > 60) { alert("Video 1 dk'dan uzun olamaz!"); btn.disabled = false; btn.innerText = "Paylaş"; } 
                    else { proceedUpload(file, text); }
                };
                video.src = URL.createObjectURL(file);
            } else { proceedUpload(file, text); }
        }

        async function proceedUpload(file, text) {
            const btn = document.getElementById('up-btn');
            btn.disabled = true; btn.innerText = "Yükleniyor...";
            if(file) {
                const ref = storage.ref('akıs/' + Date.now());
                const task = ref.put(file);
                task.on('state_changed', (s) => { document.getElementById('progress-bar').style.width = (s.bytesTransferred / s.totalBytes) * 100 + "%"; }, null, async () => {
                    const url = await task.snapshot.ref.getDownloadURL();
                    saveData(text, url, file.type);
                });
            } else { saveData(text, "", ""); }
        }

        function saveData(text, url, type) {
            db.ref('akıs').push({
                kimden: currentUser,
                mesaj: text,
                url: url,
                tip: type,
                tarih: new Date().toLocaleString('tr-TR'),
                yanit: ""
            }).then(() => {
                document.getElementById('status-msg').style.display = "block";
                document.getElementById('status-msg').innerText = "✅ Paylaşıldı!";
                setTimeout(() => location.reload(), 1500);
            });
        }

        // AKIŞ VE ADMİN KONTROLÜ
        db.ref('akıs').on('value', s => {
            const list = document.getElementById('media-list');
            list.innerHTML = "";
            const isAdmin = (currentUser === GERCEK_ADMIN_ADI && currentPass === GERCEK_ADMIN_SIFRE);

            s.forEach(c => {
                const d = c.val();
                let mediaHtml = d.url ? (d.tip.includes('image') ? `<img src="${d.url}" class="media-preview">` : `<video src="${d.url}" controls class="media-preview"></video>`) : "";
                let yanitHtml = d.yanit ? `<div class="reply-box"><b>👑 Admin Yanıtı:</b><br>${d.yanit}</div>` : "";
                
                let adminOps = isAdmin ? `
                    <div style="margin-top:10px; display:flex; gap:5px;">
                        <input type="text" id="rep-${c.key}" placeholder="Yanıtla..." style="flex:1; padding:8px; border-radius:8px; border:1px solid #ddd;">
                        <button onclick="sendReply('${c.key}')" style="background:#333; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">Gönder</button>
                    </div>` : "";

                list.innerHTML = `
                    <div class="card">
                        <b>👤 ${d.kimden}</b> <small style="float:right; color:#888;">${d.tarih || ""}</small>
                        <p style="margin:10px 0;">${d.mesaj}</p>
                        ${mediaHtml}${yanitHtml}${adminOps}
                    </div>
                ` + list.innerHTML;
            });
        });

        function sendReply(id) {
            const text = document.getElementById('rep-' + id).value;
            if(text) {
                db.ref('akıs/' + id).update({ yanit: text }).then(() => alert("Yanıtlandı!"));
            }
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
